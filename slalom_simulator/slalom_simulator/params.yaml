/**:
  ros__parameters:
    # Pool dimensions
    pool_width: 600
    pool_height: 800

    # Vehicle parameters
    vehicle_size: 40
    vehicle_start_x: 400.0
    vehicle_start_y: 500.0
    vehicle_start_z: 0.0       # starts at surface

    # Buoyancy: upward acceleration when submerged (cm/s^2, negative = upward)
    buoyancy_accel: -0.10

    # Process noise (Q matrix) — 12x12 for state [x,y,z,roll,pitch,yaw,vx,vy,vz,wroll,wpitch,wyaw]
    process_noise:
      sigma_ax_squared:     0.004   # X accel variance
      sigma_ay_squared:     0.004   # Y accel variance
      sigma_az_squared:     0.002   # Z accel variance
      sigma_aroll_squared:  0.0004  # Roll rate variance (small — vehicle stays roughly level)
      sigma_apitch_squared: 0.0004  # Pitch rate variance
      sigma_alpha_squared:  0.0004  # Yaw rate variance

    # IMU1 measurement noise (R matrix, 6x6) — [ax, ay, az, wroll, wpitch, wyaw]
    imu1_R:
      xx: 0.004     # ax variance
      yy: 0.004     # ay variance
      zz: 0.002     # az variance
      rr: 0.0004    # wroll variance
      pp: 0.0004    # wpitch variance
      tt: 0.0004    # wyaw variance

    # IMU1 bias [ax, ay, az, wroll, wpitch, wyaw]
    imu1_bias: [0.004, 0.004, 0.002, 0.0004, 0.0004, 0.0004]

    # IMU2 measurement noise (5x worse than IMU1)
    imu2_R:
      xx: 0.02
      yy: 0.02
      zz: 0.01
      rr: 0.002
      pp: 0.002
      tt: 0.002

    # IMU2 bias [ax, ay, az, wroll, wpitch, wyaw]
    imu2_bias: [0.02, 0.02, 0.01, 0.002, 0.002, 0.002]

    # Pressure sensor parameters
    ps_freq: 10.0              # Hz
    ps_noise_variance: 0.004   # depth noise variance (cm^2)

    # Pressure sensor Z fusion weight (0=IMU-only, 1=PS-only)
    ps_weight_z: 0.7

    # Gate parameters
    num_gates: 3
    gate_width_mean: 70.0
    gate_width_std: 5.0
    pole_separation_mean: 100.0
    pole_separation_std: 5.0

    # Camera parameters
    camera_fov_degrees: 60.0
    camera_fps: 8.0
    camera_pixel_variance: 4.0
    camera_range_max: 200.0

    # Controller parameters
    localization_source: "ground_truth"   # Options: ground_truth, imu1, imu2

    # PID gains — linear DOF (x, y, z, vx, vy, vz)
    pid_kp: 0.5
    pid_ki: 0.01
    pid_kd: 0.1

    # PID gains — angular DOF (yaw, wyaw)
    pid_kp_yaw: 1.0
    pid_ki_yaw: 0.005
    pid_kd_yaw: 0.2

    # Control limits
    max_control_force: 10.0
    max_control_torque: 5.0

    # Default setpoint — vehicle start pose (controller holds this on boot)
    setpoint_x: 400.0
    setpoint_y: 500.0
    setpoint_z: 0.0
    setpoint_yaw: 0.0
